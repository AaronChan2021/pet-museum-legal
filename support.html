<!DOCTYPE html>
<html lang="zh-Hans">

<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>技术支持 — Pet Museum（宠物博物馆）</title>
  <style>
    :root {
      color-scheme: light dark;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", sans-serif;
      line-height: 1.65;
      max-width: 42rem;
      margin: 0 auto;
      padding: 1.5rem 1.25rem 3rem;
      color: #1a1a1a;
      background: #fafafa;
    }

    @media (prefers-color-scheme: dark) {
      body {
        color: #e8e8e8;
        background: #121212;
      }

      a {
        color: #7ec8ff;
      }
    }

    h1 {
      font-size: 1.5rem;
      margin-top: 0;
    }

    p,
    li {
      font-size: 0.95rem;
    }

    .meta {
      font-size: 0.85rem;
      opacity: 0.75;
      margin-bottom: 1.75rem;
    }

    .lead {
      font-size: 0.95rem;
      margin-bottom: 2rem;
    }

    .card {
      border: 1px solid rgba(0, 0, 0, .12);
      border-radius: 12px;
      padding: 1.1rem 1.25rem;
      margin-bottom: 1rem;
      background: rgba(255, 255, 255, .6);
    }

    @media (prefers-color-scheme: dark) {
      .card {
        border-color: rgba(255, 255, 255, .12);
        background: rgba(255, 255, 255, .04);
      }
    }

    .card h2 {
      font-size: 0.8rem;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      margin: 0 0 0.5rem;
      opacity: 0.7;
      font-weight: 600;
    }

    .card .value {
      font-size: 1.05rem;
      margin: 0;
      word-break: break-all;
    }

    .card .hint {
      font-size: 0.85rem;
      opacity: 0.8;
      margin: 0.65rem 0 0;
    }

    .note {
      font-size: 0.88rem;
      opacity: 0.85;
      margin-top: 2rem;
      padding-top: 1.25rem;
      border-top: 1px solid rgba(0, 0, 0, .1);
    }

    @media (prefers-color-scheme: dark) {
      .note {
        border-top-color: rgba(255, 255, 255, .12);
      }
    }
  </style>
</head>

<body>
  <h1>技术支持</h1>
  <p class="meta">应用：Pet Museum（宠物博物馆）<br />运营方：王超（个人开发者）</p>

  <p class="lead">使用中有问题、建议或反馈，可通过以下方式联系。一般在数个工作日内回复邮件；小红书可私信留言（请说明机型、系统版本与大致操作步骤，便于排查）。</p>

  <section class="card" aria-labelledby="email-heading">
    <h2 id="email-heading">电子邮箱</h2>
    <p class="value"><a href="mailto:aaron.2021@gmail.com">aaron.2021@gmail.com</a></p>
    <p class="hint">点击邮箱地址即可调起系统邮件客户端。若未安装邮件 App，可复制地址后手动发送。</p>
  </section>

  <section class="card" aria-labelledby="xhs-heading">
    <h2 id="xhs-heading">小红书</h2>
    <p class="value">小红书号：<strong>257840021</strong></p>
    <p class="hint">请打开小红书 App，在搜索框输入上述小红书号，进入主页后可发送私信联系。</p>
  </section>

  <p class="note">本页仅供技术支持与联络说明，不构成法律承诺。若需查看隐私政策，请使用应用或开发者提供的隐私政策页面链接。</p>
</body>

</html>
